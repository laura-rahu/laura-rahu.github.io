<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Öine Maantee</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: black;
        width: 100%;
        height: 100%;
        font-family: sans-serif;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();


// ======================================================
// STARS
// ======================================================

const stars = [];

for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * w,
        y: Math.random() * h * 0.7,
        r: Math.random() * 2,
        t: Math.random() * Math.PI * 2
    });
}


// ======================================================
// SHOOTING STARS
// ======================================================

const meteors = [];

function createMeteor() {
    meteors.push({
        x: Math.random() * w + 200,
        y: Math.random() * h * 0.3,
        len: 120 + Math.random() * 80,
        speed: 14 + Math.random() * 8,
        life: 0,
        max: 50
    });
}

setInterval(() => {
    if (Math.random() > 0.4) {
        createMeteor();
    }
}, 2500);


// ======================================================
// LIGHTNING
// ======================================================

let flash = 0;

function lightning() {

    let x = Math.random() * w;

    ctx.beginPath();
    ctx.moveTo(x, 0);

    let y = 0;

    while (y < h * 0.55) {

        x += (Math.random() - 0.5) * 40;
        y += Math.random() * 35;

        ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 3;

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#9fdfff";

    ctx.stroke();

    ctx.shadowBlur = 0;

    flash = 0.3;
}


// ======================================================
// CARS
// ======================================================

const cars = [];

for (let i = 0; i < 12; i++) {

    const dir = Math.random() > 0.5 ? 1 : -1;

    cars.push({
        x: Math.random() * w,
        y: h * 0.72 + Math.random() * 80,
        speed: 3 + Math.random() * 7,
        dir: dir,
        color: dir === 1 ? "#ffee88" : "#ff2b2b",
        size: 0.8 + Math.random() * 0.7
    });
}


// ======================================================
// DRAW SKY
// ======================================================

function drawSky() {

    const g = ctx.createLinearGradient(0, 0, 0, h);

    g.addColorStop(0, "#01040d");
    g.addColorStop(0.4, "#07172d");
    g.addColorStop(1, "#0a0a0a");

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    // stars

    stars.forEach(s => {

        s.t += 0.02;

        const a = 0.5 + Math.sin(s.t) * 0.5;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);

        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
    });
}


// ======================================================
// DRAW METEORS
// ======================================================

function drawMeteors() {

    for (let i = meteors.length - 1; i >= 0; i--) {

        const m = meteors[i];

        const x2 = m.x - m.len;
        const y2 = m.y + m.len * 0.4;

        const g = ctx.createLinearGradient(m.x, m.y, x2, y2);

        g.addColorStop(0, "rgba(255,255,255,1)");
        g.addColorStop(1, "rgba(255,255,255,0)");

        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(x2, y2);

        ctx.strokeStyle = g;
        ctx.lineWidth = 2;

        ctx.stroke();

        m.x -= m.speed;
        m.y += m.speed * 0.4;

        m.life++;

        if (m.life > m.max) {
            meteors.splice(i, 1);
        }
    }
}


// ======================================================
// DRAW ROAD
// ======================================================

function drawRoad() {

    const roadY = h * 0.7;

    // road

    ctx.fillStyle = "#111";
    ctx.fillRect(0, roadY, w, h - roadY);

    // road glow

    const glow = ctx.createLinearGradient(0, roadY, 0, h);

    glow.addColorStop(0, "rgba(255,255,255,0.03)");
    glow.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0, roadY, w, h);

    // dashed lines

    ctx.strokeStyle = "#ffd84d";
    ctx.lineWidth = 4;

    for (let x = 0; x < w; x += 80) {

        ctx.beginPath();
        ctx.moveTo(x, roadY + 45);
        ctx.lineTo(x + 40, roadY + 45);
        ctx.stroke();
    }
}


// ======================================================
// DRAW CAR
// ======================================================

function drawCar(car) {

    const x = car.x;
    const y = car.y;
    const s = car.size;

    // movement

    car.x += car.speed * car.dir;

    if (car.dir === 1 && car.x > w + 100) {
        car.x = -100;
    }

    if (car.dir === -1 && car.x < -100) {
        car.x = w + 100;
    }

    // headlights / taillights glow

    ctx.shadowBlur = 20;
    ctx.shadowColor = car.color;

    // body

    ctx.fillStyle = "#1a1a1a";

    ctx.beginPath();
    ctx.roundRect(x, y, 70 * s, 24 * s, 8);
    ctx.fill();

    // top

    ctx.beginPath();
    ctx.roundRect(x + 15 * s, y - 14 * s, 35 * s, 16 * s, 6);
    ctx.fill();

    // wheels

    ctx.shadowBlur = 0;

    ctx.fillStyle = "#000";

    ctx.beginPath();
    ctx.arc(x + 15 * s, y + 24 * s, 7 * s, 0, Math.PI * 2);
    ctx.arc(x + 55 * s, y + 24 * s, 7 * s, 0, Math.PI * 2);
    ctx.fill();

    // lights

    ctx.shadowBlur = 25;
    ctx.shadowColor = car.color;

    ctx.fillStyle = car.color;

    if (car.dir === 1) {

        // headlights

        ctx.fillRect(x + 66 * s, y + 4 * s, 8 * s, 5 * s);

    } else {

        // taillights

        ctx.fillRect(x - 4 * s, y + 4 * s, 8 * s, 5 * s);
    }

    ctx.shadowBlur = 0;
}


// ======================================================
// FLASH
// ======================================================

function drawFlash() {

    if (flash > 0.01) {

        ctx.fillStyle = `rgba(255,255,255,${flash})`;
        ctx.fillRect(0, 0, w, h);

        flash *= 0.92;
    }
}


// ======================================================
// ANIMATION
// ======================================================

let timer = 0;

function animate() {

    requestAnimationFrame(animate);

    drawSky();

    drawMeteors();

    drawRoad();

    cars.forEach(drawCar);

    timer++;

    if (timer > 120 + Math.random() * 220) {
        lightning();
        timer = 0;
    }

    drawFlash();
}

animate();

</script>
</body>
</html>
