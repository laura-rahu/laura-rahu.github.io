<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars MP3 Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;

    /* WALLPAPER */
    background-image:url("index.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* PLAYER */
.player{
    position:relative;
    width:470px;
    max-width:95vw;
}

/* PLAYER IMAGE */
.player img{
    width:100%;
    display:block;
    user-select:none;
    pointer-events:none;
}

/* WHITE SCREEN AREA */
.screen{
    position:absolute;
    top:78px;
    left:74px;
    width:318px;
    height:92px;
    padding:8px 10px;
    color:black;
}

/* SONG NAME */
.song{
    font-size:17px;
    font-weight:bold;
    text-align:left;
    margin-bottom:3px;
}

/* ARTIST */
.artist{
    font-size:13px;
    text-align:left;
    margin-bottom:12px;
    color:#444;
}

/* TIMELINE */
.progress-container{
    width:100%;
    height:8px;
    background:#555;
    border-radius:20px;
    overflow:hidden;
    box-shadow:
        inset 2px 2px 4px rgba(0,0,0,0.6),
        inset -1px -1px 2px rgba(255,255,255,0.15);
}

.progress{
    width:0%;
    height:100%;
    background:black;
    transition:width 0.1s linear;
}

/* TIME */
.time-row{
    margin-top:4px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:black;
}

/* INVISIBLE BUTTONS ON TOP OF REAL BLACK BUTTONS */
.controls button{
    position:absolute;
    border:none;
    background:transparent;
    cursor:pointer;
    border-radius:50%;
}

/* BEVELED FEEL */
.controls button:active{
    transform:translateY(2px);
    filter:brightness(0.8);
}

/* BACK BUTTON */
#backBtn{
    width:56px;
    height:56px;
    left:98px;
    bottom:46px;
}

/* PLAY BUTTON */
#playBtn{
    width:68px;
    height:68px;
    left:198px;
    bottom:40px;
}

/* FORWARD BUTTON */
#forwardBtn{
    width:56px;
    height:56px;
    right:100px;
    bottom:46px;
}

</style>
</head>

<body>

<div class="player">

    <!-- MP3 PLAYER IMAGE -->
    <img src="picne.mp3player.png" alt="MP3 Player">

    <!-- SCREEN -->
    <div class="screen">

        <div class="song">
            Life is a Highway
        </div>

        <div class="artist">
            Rascal Flatts
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="remainingTime">-0:00</span>
        </div>

    </div>

    <!-- CLICK AREAS -->
    <div class="controls">

        <button id="backBtn"></button>

        <button id="playBtn"></button>

        <button id="forwardBtn"></button>

    </div>

</div>

<!-- AUDIO -->
<audio id="audio">
    <source src="Cars (Soundtrack) - Life Is A Highway.mp3" type="audio/mp3">
</audio>

<script>

const audio = document.getElementById("audio");

const playBtn = document.getElementById("playBtn");
const backBtn = document.getElementById("backBtn");
const forwardBtn = document.getElementById("forwardBtn");

const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");

const currentTimeEl = document.getElementById("currentTime");
const remainingTimeEl = document.getElementById("remainingTime");

let isPlaying = false;

/* FORMAT TIME */
function formatTime(seconds){

    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);

    return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
}

/* PLAY / PAUSE */
playBtn.addEventListener("click", () => {

    if(isPlaying){

        audio.pause();

    }else{

        audio.play();
    }

    isPlaying = !isPlaying;
});

/* BACK 15s */
backBtn.addEventListener("click", () => {

    audio.currentTime -= 15;
});

/* FORWARD 15s */
forwardBtn.addEventListener("click", () => {

    audio.currentTime += 15;
});

/* UPDATE PROGRESS */
audio.addEventListener("timeupdate", () => {

    const current = audio.currentTime;
    const duration = audio.duration || 0;

    const percent = (current / duration) * 100;

    progress.style.width = percent + "%";

    currentTimeEl.textContent = formatTime(current);

    const remaining = duration - current;

    remainingTimeEl.textContent = "-" + formatTime(remaining);
});

/* CLICK TIMELINE */
progressContainer.addEventListener("click", (e) => {

    const width = progressContainer.clientWidth;

    const clickX = e.offsetX;

    const duration = audio.duration;

    audio.currentTime = (clickX / width) * duration;
});

/* SONG END */
audio.addEventListener("ended", () => {

    isPlaying = false;
});

</script>

</body>
</html>
