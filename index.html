<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars MP3 Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;

    /* WALLPAPER */
    background-image:url("index.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* PLAYER */
.player{
    position:relative;
    width:470px;
    max-width:95vw;
}

/* PLAYER IMAGE */
.player img{
    width:100%;
    display:block;
    user-select:none;
    pointer-events:none;
}

/* SCREEN */
.screen{
    position:absolute;
    top:78px;
    left:74px;
    width:318px;
    height:92px;
    padding:8px 10px;
    color:black;
}

/* SONG */
.song{
    font-size:16px;
    font-weight:bold;
    text-align:left;
    margin-bottom:2px;
}

/* ARTIST */
.artist{
    font-size:13px;
    text-align:left;
    color:#444;
}

/* CENTER THE LINE */
.timeline-area{
    position:absolute;
    left:0;
    top:48px;
    width:100%;
}

/* PROGRESS BAR */
.progress-container{
    width:100%;
    height:8px;
    background:#666;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;

    box-shadow:
        inset 2px 2px 4px rgba(0,0,0,0.7),
        inset -1px -1px 2px rgba(255,255,255,0.2);
}

.progress{
    width:0%;
    height:100%;
    background:black;
}

/* TIMES */
.time-row{
    margin-top:4px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:black;
}

/* REAL BUTTON HITBOXES */
.btn{
    position:absolute;
    border:none;
    background:transparent;
    cursor:pointer;
    border-radius:50%;
    z-index:999;
}

/* PRESS EFFECT */
.btn:active{
    transform:translateY(2px);
}

/* LEFT BUTTON */
#backBtn{
    width:62px;
    height:62px;
    left:88px;
    bottom:40px;
}

/* CENTER BUTTON */
#playBtn{
    width:76px;
    height:76px;
    left:196px;
    bottom:34px;
}

/* RIGHT BUTTON */
#forwardBtn{
    width:62px;
    height:62px;
    right:88px;
    bottom:40px;
}

</style>
</head>

<body>

<div class="player">

    <!-- PLAYER IMAGE -->
    <img src="picne.mp3player.png" alt="MP3 Player">

    <!-- SCREEN -->
    <div class="screen">

        <div class="song">
            Life is a Highway
        </div>

        <div class="artist">
            Rascal Flatts
        </div>

        <!-- CENTERED TIMELINE -->
        <div class="timeline-area">

            <div class="progress-container" id="progressContainer">
                <div class="progress" id="progress"></div>
            </div>

            <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="remainingTime">-0:00</span>
            </div>

        </div>

    </div>

    <!-- BUTTON AREAS -->
    <button class="btn" id="backBtn"></button>

    <button class="btn" id="playBtn"></button>

    <button class="btn" id="forwardBtn"></button>

</div>

<!-- AUDIO -->
<audio id="audio">
    <source src="Cars (Soundtrack) - Life Is A Highway.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");

const playBtn = document.getElementById("playBtn");
const backBtn = document.getElementById("backBtn");
const forwardBtn = document.getElementById("forwardBtn");

const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");

const currentTimeEl = document.getElementById("currentTime");
const remainingTimeEl = document.getElementById("remainingTime");

let isPlaying = false;

/* FORMAT TIME */
function formatTime(seconds){

    if(isNaN(seconds)) return "0:00";

    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);

    return mins + ":" + (secs < 10 ? "0" : "") + secs;
}

/* PLAY / PAUSE */
playBtn.addEventListener("click", () => {

    if(isPlaying){

        audio.pause();

    }else{

        audio.play();
    }

    isPlaying = !isPlaying;
});

/* BACK 15 SEC */
backBtn.addEventListener("click", () => {

    audio.currentTime = Math.max(0, audio.currentTime - 15);
});

/* FORWARD 15 SEC */
forwardBtn.addEventListener("click", () => {

    audio.currentTime = Math.min(
        audio.duration,
        audio.currentTime + 15
    );
});

/* UPDATE TIMELINE */
audio.addEventListener("timeupdate", () => {

    const current = audio.currentTime;
    const duration = audio.duration || 0;

    const percent = (current / duration) * 100;

    progress.style.width = percent + "%";

    currentTimeEl.textContent = formatTime(current);

    const remaining = duration - current;

    remainingTimeEl.textContent =
        "-" + formatTime(remaining);
});

/* CLICK TIMELINE */
progressContainer.addEventListener("click", (e) => {

    const width = progressContainer.clientWidth;

    const clickX = e.offsetX;

    const duration = audio.duration;

    audio.currentTime = (clickX / width) * duration;
});

/* SONG ENDED */
audio.addEventListener("ended", () => {

    isPlaying = false;
});

</script>

</body>
</html>
